server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Railway private network is IPv6-only; its internal DNS lives at fd12::10.
    # Short validity so re-deployed services get fresh addresses.
    resolver [fd12::10] valid=10s;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript image/svg+xml;

    location /api/ {
        # Variable forces runtime DNS resolution via the resolver above, so
        # nginx starts even if the backend service isn't up yet.
        set $backend_upstream http://backend.railway.internal:4000;
        proxy_pass $backend_upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
